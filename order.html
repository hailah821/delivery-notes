<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تفاصيل طلبك</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --ink: #1C1A17;
  --ink2: #6B6760;
  --ink3: #AAA79F;
  --accent: #C8521A;
  --accent-light: #FAF0EA;
  --green: #2D6A2D;
  --green-light: #E8F5E8;
  --border: rgba(28,26,23,0.1);
  --border-mid: rgba(28,26,23,0.18);
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 36px 16px; }
.wrap { max-width: 520px; margin: 0 auto; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pop { 0% { transform:scale(0.5); opacity:0; } 80% { transform:scale(1.1); } 100% { transform:scale(1); opacity:1; } }
@keyframes spin { to { transform:rotate(360deg); } }

.logo { display:flex; align-items:center; gap:12px; margin-bottom:24px; animation:fadeUp 0.3s ease; }
.logo-mark { width:36px; height:36px; background:var(--ink); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; font-weight:600; }
.logo span { font-size:15px; font-weight:500; color:var(--ink2); }

.card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:22px 26px; box-shadow:var(--shadow); margin-bottom:12px; animation:fadeUp 0.35s ease both; }
.card:nth-child(2){animation-delay:.05s} .card:nth-child(3){animation-delay:.1s} .card:nth-child(4){animation-delay:.15s}

.section-label { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:14px; }
.customer-name { font-size:22px; font-weight:600; margin-bottom:4px; }
.order-meta { font-size:13px; color:var(--ink3); }
.status-badge { display:inline-flex; align-items:center; gap:6px; background:var(--accent-light); color:var(--accent); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:500; margin-top:10px; }

table { width:100%; border-collapse:collapse; font-size:14px; }
thead th { text-align:right; padding:8px 10px; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--ink3); border-bottom:1px solid var(--border); }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:last-child { border-bottom:none; }
tbody td { padding:10px 10px; }
.qty-badge { display:inline-flex; align-items:center; justify-content:center; background:var(--bg); border:1px solid var(--border-mid); border-radius:6px; width:32px; height:28px; font-size:13px; font-weight:500; }

label { display:block; font-size:13px; font-weight:500; color:var(--ink2); margin-bottom:8px; }
input[type="tel"] { font-family:'IBM Plex Sans Arabic',sans-serif; font-size:16px; color:var(--ink); background:var(--bg); border:1px solid var(--border-mid); border-radius:var(--radius-sm); padding:12px 14px; width:100%; outline:none; transition:all .15s; direction:ltr; text-align:right; }
input[type="tel"]:focus { border-color:var(--accent); background:white; box-shadow:0 0 0 3px rgba(200,82,26,.08); }

.confirm-btn { width:100%; background:var(--green); color:white; border:none; border-radius:var(--radius-sm); padding:15px; font-family:'IBM Plex Sans Arabic',sans-serif; font-size:16px; font-weight:500; cursor:pointer; transition:all .15s; margin-top:14px; display:flex; align-items:center; justify-content:center; gap:8px; }
.confirm-btn:hover { background:#1f4d1f; }
.confirm-btn:disabled { opacity:.6; cursor:not-allowed; }

.loading { text-align:center; padding:80px 20px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--ink); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }

.error-screen { text-align:center; padding:80px 20px; }
.error-screen h2 { font-size:20px; margin-bottom:8px; }

.success-screen { display:none; text-align:center; padding:20px; animation:fadeUp .4s ease; }
.success-screen.show { display:block; }
.checkmark { width:80px; height:80px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 20px; animation:pop .4s ease; }
.success-screen h2 { font-size:24px; font-weight:600; margin-bottom:8px; color:var(--green); }
.success-screen p { color:var(--ink2); font-size:14px; line-height:1.7; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; border-radius:var(--radius-sm); padding:12px 20px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:99; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.15); }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">ت</div>
    <span>نظام التوصيل</span>
  </div>

  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    <p style="color:var(--ink2);font-size:14px">جارٍ تحميل بيانات الطلب...</p>
  </div>

  <div id="error-screen" class="error-screen" style="display:none">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <h2>الطلب غير موجود</h2>
    <p style="color:var(--ink2);font-size:14px">الرابط غير صحيح أو انتهت صلاحيته</p>
  </div>

  <div id="order-content" style="display:none">
    <div class="card">
      <div class="customer-name" id="cust-name-display"></div>
      <div class="order-meta" id="order-date-display"></div>
      <div class="status-badge">🚚 قيد التوصيل</div>
    </div>

    <div class="card">
      <div class="section-label">تفاصيل الطلب</div>
      <table>
        <thead>
          <tr>
            <th>المنتج</th>
            <th style="text-align:center;width:80px">الكمية</th>
            <th style="width:110px">ملاحظة</th>
          </tr>
        </thead>
        <tbody id="products-display"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="section-label">تأكيد الاستلام</div>
      <label>الاسم *</label>
      <input type="text" id="cust-name-input" placeholder="أدخل اسمك" style="margin-bottom:12px" />
      <label>رقم الجوال *</label>
      <input type="tel" id="cust-phone" placeholder="05xxxxxxxx" style="margin-bottom:12px" />
      <label>الإيميل *</label>
      <input type="email" id="cust-email" placeholder="example@email.com" style="margin-bottom:0;direction:ltr;text-align:right" />
      <button class="confirm-btn" id="confirm-btn">
        ✅ تم الاستلام
      </button>
    </div>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="checkmark">✓</div>
    <h2>تم الاستلام بنجاح!</h2>
    <p>شكراً لك! تم تسجيل استلامك للطلب.<br/>سيصلك الإيصال على واتساب الآن.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://vsesudmfoljaumdunhnj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QDkHvfDNENs1Cu0yeOcS3w_JkzaTcpk';
const NOTIFY_EMAILS = ['monera@ygii.app','asj@ygii.app','hello@ygii.app'];
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let order = null;

async function loadOrder() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { showError(); return; }

  const { data, error } = await sb.from('orders').select('*').eq('id', id).single();
  if (error || !data) { showError(); return; }
  order = data;

  if (data.status === 'delivered') {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
    return;
  }

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('order-content').style.display = 'block';
  document.getElementById('cust-name-display').textContent = data.customer_name;
  document.getElementById('order-date-display').textContent = 'تاريخ الطلب: ' + new Date(data.created_at).toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });

  const tbody = document.getElementById('products-display');
  data.products.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="font-weight:500">${p.name}</td><td style="text-align:center"><span class="qty-badge">${p.qty}</span></td><td style="color:var(--ink3);font-size:13px">${p.note||'—'}</td>`;
    tbody.appendChild(tr);
  });
}

async function confirmDelivery() {
  const name = document.getElementById('cust-name-input').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const email = document.getElementById('cust-email').value.trim();
  if (!name) { showToast('❌ أدخل اسمك'); return; }
  if (!phone || phone.length < 9) { showToast('❌ أدخل رقم جوال صحيح'); return; }
  if (!email) { showToast('❌ أدخل إيميلك'); return; }

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = 'جارٍ المعالجة...';

  await sb.from('orders').update({ status: 'delivered', customer_phone: phone, customer_name_confirmed: name, customer_email: email }).eq('id', order.id);

  document.getElementById('order-content').style.display = 'none';
  document.getElementById('success-screen').classList.add('show');

  setTimeout(() => {
    sendWhatsApp(phone);
    sendEmail(phone, name, email);
  }, 600);
}

function sendWhatsApp(phone) {
  const clean = phone.replace(/\D/g,'');
  const full = clean.startsWith('966') ? clean : '966' + clean.replace(/^0/,'');
  const total = order.products.reduce((s,p) => s + p.qty, 0);
  const date = new Date().toLocaleDateString('ar-SA');

  let msg = `✅ إيصال استلام\n`;
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `👤 الاسم: ${order.customer_name}\n`;
  msg += `📅 التاريخ: ${date}\n`;
  msg += `🔖 رقم الطلب: ${order.id.substring(0,8).toUpperCase()}\n`;
  msg += `━━━━━━━━━━━━━━\n📦 المنتجات:\n`;
  order.products.forEach((p,i) => {
    msg += `${i+1}. ${p.name} — الكمية: ${p.qty}${p.note ? ` (${p.note})` : ''}\n`;
  });
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `📊 الإجمالي: ${total} وحدة\n`;
  msg += `✔️ تم الاستلام بنجاح\n\nشكراً لثقتكم 🙏`;

  window.open(`https://wa.me/${full}?text=${encodeURIComponent(msg)}`, '_blank');
}

function sendEmail(phone, name, email) {
  const subject = `تم توصيل طلب — ${order.customer_name}`;
  const total = order.products.reduce((s,p) => s + p.qty, 0);
  let body = `تم توصيل الطلب بنجاح ✅\n\n`;
  body += `العميل: ${name || order.customer_name}\n`;
  body += `الجوال: ${phone}\n`;
  body += `التاريخ: ${new Date().toLocaleString('ar-SA')}\n\n`;
  body += `المنتجات:\n`;
  order.products.forEach((p,i) => { body += `${i+1}. ${p.name} — الكمية: ${p.qty}\n`; });
  body += `\nالإجمالي: ${total} وحدة`;
  const recipients = email ? `${email},${NOTIFY_EMAILS.join(',')}` : NOTIFY_EMAILS.join(',');
  window.open(`mailto:${recipients}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
}

function showError() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadOrder();
</script>
</body>
</html>
