<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Previous Orders — Ygii</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #F0F0F0; padding: 30px 16px; }
.page { max-width: 700px; margin: 0 auto; }
.header { background: white; border: 1px solid #ccc; padding: 20px 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 700; color: #484888; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
.logo-text { font-size: 28px; font-weight: 900; color: #484888; }
.back-btn { display: inline-block; color: #484888; font-size: 13px; text-decoration: none; border: 1px solid #484888; padding: 6px 14px; margin-bottom: 16px; cursor: pointer; background: white; }
.back-btn:hover { background: #484888; color: white; }
.search-bar { background: white; border: 1px solid #ccc; padding: 12px 16px; margin-bottom: 16px; }
.search-bar input { width: 100%; border: 1px solid #ccc; padding: 8px 12px; font-family: inherit; font-size: 13px; outline: none; }
.search-bar input:focus { border-color: #484888; }
.orders-list { background: white; border: 1px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.order-item { padding: 14px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
.order-item:last-child { border-bottom: none; }
.order-item:hover { background: #f5f5ff; }
.order-company { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.order-meta { font-size: 12px; color: #888; margin-top: 3px; }
.order-status { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.status-delivered { background: #e8f5e8; color: #2d6a2d; }
.status-pending { background: #fff3e0; color: #e65100; }
.detail-view { display: none; }
.detail-card { background: white; border: 1px solid #ccc; padding: 24px 28px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.detail-header { border-bottom: 2px solid #484888; padding-bottom: 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; }
.detail-title { font-size: 18px; font-weight: 700; color: #484888; }
.info-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.info-table td { border: 1px solid #ddd; padding: 8px 12px; }
.info-table .label { background: #eeeef8; font-weight: 600; color: #484888; width: 160px; }
.prod-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.prod-table th { background: #484888; color: white; padding: 8px 12px; text-align: center; }
.prod-table td { border: 1px solid #ddd; padding: 8px 12px; text-align: center; }
.loading { text-align: center; padding: 40px; color: #888; }
.spinner { width: 30px; height: 30px; border: 3px solid #eeeef8; border-top-color: #484888; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="page">
  <div id="list-view">
    <div class="header">
      <div><h1>Previous Orders</h1><p>All delivery notes</p></div>
      
    </div>
    <a href="index.html" class="back-btn">← New Order</a>
    <div class="search-bar"><input type="text" id="search-input" placeholder="Search by company name..." /></div>
    <div id="orders-container"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
  </div>
  <div id="detail-view" class="detail-view">
    <button class="back-btn" id="back-to-list">← Back to Orders</button>
    <div class="detail-card">
      <div class="detail-header">
        <div><div class="detail-title" id="detail-company"></div><div style="font-size:12px;color:#888;margin-top:2px" id="detail-dn"></div></div>
        <div id="detail-status-badge"></div>
      </div>
      <table class="info-table">
        <tr><td class="label">Company Name</td><td id="d-company"></td></tr>
        <tr><td class="label">Delivery Note No.</td><td id="d-dn"></td></tr>
        <tr><td class="label">Date</td><td id="d-date"></td></tr>
        <tr><td class="label">Status</td><td id="d-status"></td></tr>
        <tr id="customer-row" style="display:none"><td class="label">Customer Name</td><td id="d-customer"></td></tr>
        <tr id="phone-row" style="display:none"><td class="label">Phone</td><td id="d-phone"></td></tr>
        <tr id="email-row" style="display:none"><td class="label">Email</td><td id="d-email"></td></tr>
      </table>
      <p style="font-size:12px;font-weight:600;color:#484888;margin-bottom:8px">Products</p>
      <table class="prod-table">
        <thead><tr><th style="width:50px">NO</th><th style="text-align:left">Statement</th><th style="width:100px">Quantity</th></tr></thead>
        <tbody id="d-products"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient('https://vsesudmfoljaumdunhnj.supabase.co','sb_publishable_QDkHvfDNENs1Cu0yeOcS3w_JkzaTcpk');
let allOrders = [];
async function loadOrders() {
  const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  allOrders = data || [];
  renderOrders(allOrders);
}
function renderOrders(orders) {
  const c = document.getElementById('orders-container');
  if (!orders.length) { c.innerHTML = '<div class="empty">No orders found</div>'; return; }
  c.innerHTML = '<div class="orders-list">' + orders.map(o => `<div class="order-item" onclick="showDetail('${o.id}')"><div><div class="order-company">${o.customer_name||'Unknown'}</div><div class="order-meta">${o.delivery_no||o.id.substring(0,8).toUpperCase()} · ${o.order_date||new Date(o.created_at).toLocaleDateString('en-GB')}</div></div><div style="display:flex;align-items:center;gap:10px"><span class="order-status ${o.status==='delivered'?'status-delivered':'status-pending'}">${o.status==='delivered'?'Delivered':'Pending'}</span><span style="color:#ccc">›</span></div></div>`).join('') + '</div>';
}
function showDetail(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-company').textContent = o.customer_name||'Unknown';
  document.getElementById('detail-dn').textContent = 'DN: '+(o.delivery_no||o.id.substring(0,8).toUpperCase());
  document.getElementById('detail-status-badge').innerHTML = `<span class="order-status ${o.status==='delivered'?'status-delivered':'status-pending'}">${o.status==='delivered'?'Delivered':'Pending'}</span>`;
  document.getElementById('d-company').textContent = o.customer_name||'—';
  document.getElementById('d-dn').textContent = o.delivery_no||'—';
  document.getElementById('d-date').textContent = o.order_date||new Date(o.created_at).toLocaleDateString('en-GB');
  document.getElementById('d-status').textContent = o.status==='delivered'?'Delivered ✓':'Pending';
  if (o.customer_name_confirmed) { document.getElementById('customer-row').style.display=''; document.getElementById('d-customer').textContent=o.customer_name_confirmed; }
  if (o.customer_phone) { document.getElementById('phone-row').style.display=''; document.getElementById('d-phone').textContent=o.customer_phone; }
  if (o.customer_email) { document.getElementById('email-row').style.display=''; document.getElementById('d-email').textContent=o.customer_email; }
  const tbody = document.getElementById('d-products');
  tbody.innerHTML = (o.products||[]).map((p,i) => `<tr><td>${i+1}</td><td style="text-align:left">${p.name}</td><td>${p.qty}</td></tr>`).join('');
}
document.getElementById('back-to-list').addEventListener('click', function() {
  document.getElementById('detail-view').style.display='none';
  document.getElementById('list-view').style.display='block';
});
document.getElementById('search-input').addEventListener('input', function() {
  renderOrders(allOrders.filter(o => (o.customer_name||'').toLowerCase().includes(this.value.toLowerCase())));
});
loadOrders();
</script>
</body>
</html>
